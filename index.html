<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>트럼프 카드 점수 게임</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>트럼프 카드 점수 게임</h1>
    <section class="status-card">
      <div class="status-row">
        <div>
          <strong>현재 점수</strong>
          <p id="score">300</p>
        </div>
        <div>
          <strong>남은 카드</strong>
          <p id="remaining">30</p>
        </div>
        <div>
          <strong>남은 목숨</strong>
          <p id="lives" class="lives-display">♥♥♥</p>
        </div>
      </div>
      <div class="status-row single">
        <div>
          <strong>결과</strong>
          <p id="message">카드를 클릭하면 카드가 뒤집혀요.</p>
        </div>
      </div>
    </section>

    <section class="cards-area" id="cardsArea">
      <h2>카드</h2>
      <div class="card-grid" id="cardGrid" aria-hidden="false"></div>
    </section>

    <section class="shop-card">
      <h2>상점</h2>
      <div class="shop-items">
        <div class="shop-item">
          <div class="item-info">
            <h3>카드 확인</h3>
            <p class="item-desc">다음 카드가 무엇인지 미리 확인합니다.</p>
            <p class="item-price">가격: <span class="price-value">500</span>점</p>
            <p class="item-usage">사용: <span id="peekUsed">0</span>/3</p>
          </div>
          <button id="peekBtn" class="shop-btn">구매</button>
        </div>
        <div class="shop-item">
          <div class="item-info">
            <h3>카드 교체</h3>
            <p class="item-desc">현재 카드를 새로운 카드로 교체합니다.</p>
            <p class="item-price">가격: <span class="price-value">300</span>점</p>
            <p class="item-usage">사용: <span id="replaceUsed">0</span>/5</p>
          </div>
          <button id="replaceBtn" class="shop-btn">구매</button>
        </div>
      </div>
    </section>

  </main>
  <script src="script.js"></script>
</body>
</html>
